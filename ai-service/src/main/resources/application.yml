server:
  port: 8087

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/education_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: password
    
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.edu.platform.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-nanjing.aliyuncs.com
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: class-practice
    folder: education/ai-temp

# 阿里百炼 AI 配置
ai:
  bailian:
    api-key: ${BAILIAN_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    analyze:
      model: qwen-long
      max-tokens: 2000
      temperature: 0.3
    recommend:
      model: qwen-plus
      max-tokens: 1000
      temperature: 0.5

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.edu.platform.ai: DEBUG

# Feign 超时配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 60000
