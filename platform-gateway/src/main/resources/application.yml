server:
  port: 8080

spring:
  application:
    name: platform-gateway

  # Nacos 服务注册与发现
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos

    gateway:
      # 开启从 Nacos 自动发现服务
      discovery:
        locator:
          enabled: false  # 不使用自动路由，手动配置

      # 全局默认过滤器
      default-filters:
        - RemoveRequestHeader=Cookie  # 避免将 Cookie 透传给下游

      routes:
        # 用户服务路由
        # AuthController: /api/v1/auth
        # SchoolController: /api/v1/schools
        # RoleController: /api/v1/roles
        # UserManageController: /api/v1/users/manage
        # FileController: /api/v1/files
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/schools/**,/api/v1/roles/**,/api/v1/files/**

        # 资源服务路由
        # ResourceController: /api/v1/resources
        # TagController: /api/v1/tags
        # CategoryController: /api/v1/categories
        # FileUploadController: /api/v1/upload
        - id: resource-service
          uri: lb://resource-service
          predicates:
            - Path=/api/v1/resources/**,/api/v1/tags/**,/api/v1/categories/**,/api/v1/upload/**

        # 课程服务路由
        # CourseController / CourseMemberController: /api/v1/courses
        # CoursewareController: /api/v1（内含 /api/v1/coursewares/**）
        # CoursewareFileController: /api/v1/courseware/files
        # ChapterController: /api/v1/courses/{courseId}/chapters
        # TaskController: /api/v1/courses/{courseId}/tasks
        # AnnouncementController: /api/v1/courses/{courseId}/announcements
        # QuestionController: /api/v1/questions
        # PaperController: /api/v1/papers
        # StudentExamController: /api/v1/student/exams
        # AnswerController: /api/v1/student/answers
        # GradingController: /api/v1/grading
        # DimensionController: /api/v1/dimensions
        # AdminCourseController: /api/v1/admin/courses
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/v1/courses/**,/api/v1/coursewares/**,/api/v1/courseware/**,/api/v1/chapters/**,/api/v1/tasks/**,/api/v1/questions/**,/api/v1/papers/**,/api/v1/announcements/**,/api/v1/student/**,/api/v1/grading/**,/api/v1/dimensions/**,/api/v1/admin/courses/**

        # 社区服务路由（实际前缀均为 /api/v1/community/）
        # PostController: /api/v1/community/posts
        # CommentController: /api/v1/community/comments
        # LikeController: /api/v1/community/likes
        # GroupController / GroupTopicController / GroupDocumentController / GroupChatController: /api/v1/community/groups
        # FileController / FileUploadController: /api/v1/community/files
        # EasemobController: /api/v1/community/easemob
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/api/v1/community/**

        # 报告服务路由
        # BehaviorController: /api/v1/behaviors
        # ProfileController: /api/v1/profiles
        # ReportController: /api/v1/reports
        # HealthController: /api/v1/health
        # AdminConfigController: /api/v1/admin/config
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/v1/behaviors/**,/api/v1/profiles/**,/api/v1/reports/**,/api/v1/health/**,/api/v1/admin/config/**

        # 审核服务路由
        # AuditController: /api/v1/audit
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**

        # Knife4j 文档聚合路由 - user-service
        - id: user-service-doc
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs,/user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service(?<segment>/?.*), $\{segment}

        # Knife4j 文档聚合路由 - resource-service
        - id: resource-service-doc
          uri: lb://resource-service
          predicates:
            - Path=/resource-service/v3/api-docs,/resource-service/v3/api-docs/**
          filters:
            - RewritePath=/resource-service(?<segment>/?.*), $\{segment}

        # Knife4j 文档聚合路由 - course-service
        - id: course-service-doc
          uri: lb://course-service
          predicates:
            - Path=/course-service/v3/api-docs,/course-service/v3/api-docs/**
          filters:
            - RewritePath=/course-service(?<segment>/?.*), $\{segment}

        # Knife4j 文档聚合路由 - community-service
        - id: community-service-doc
          uri: lb://community-service
          predicates:
            - Path=/community-service/v3/api-docs,/community-service/v3/api-docs/**
          filters:
            - RewritePath=/community-service(?<segment>/?.*), $\{segment}

        # Knife4j 文档聚合路由 - report-service
        - id: report-service-doc
          uri: lb://report-service
          predicates:
            - Path=/report-service/v3/api-docs,/report-service/v3/api-docs/**
          filters:
            - RewritePath=/report-service(?<segment>/?.*), $\{segment}

        # Knife4j 文档聚合路由 - audit-service
        - id: audit-service-doc
          uri: lb://audit-service
          predicates:
            - Path=/audit-service/v3/api-docs,/audit-service/v3/api-docs/**
          filters:
            - RewritePath=/audit-service(?<segment>/?.*), $\{segment}

      # CORS 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            # allowed-origins 与 allow-credentials 不兼容，使用 allowedOriginPatterns
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

  # Redis 配置（限流使用）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

# 网关自定义配置
gateway:
  # JWT 白名单路径（无需 Token 即可访问）
  white-list:
    # 用户服务 - 认证相关（无需登录）
    - /api/v1/auth/register
    - /api/v1/auth/login
    - /api/v1/auth/phone-password-login
    - /api/v1/auth/phone-code-login
    - /api/v1/auth/send-code
    # 资源服务 - 公开标签列表（无需登录）
    - /api/v1/tags/enabled
    # 报告服务 - 健康检查（无需登录）
    - /api/v1/health/**
    # Knife4j 文档相关（完整放行，含通配符覆盖所有子路径）
    - /doc.html
    - /webjars/**
    - /swagger-resources/**
    - /v3/api-docs
    - /v3/api-docs/**
    - /*/v3/api-docs
    - /*/v3/api-docs/**
    - /knife4j/**

# Knife4j Gateway 聚合文档配置（4.x hand 手动模式）
knife4j:
  gateway:
    enabled: true
    # 使用 hand 策略：手动指定每个服务的文档路径
    strategy: MANUAL
    routes:
      - name: 用户服务
        # url：网关层访问下游服务文档的路径（即网关路由转发后下游的 /v3/api-docs）
        url: /user-service/v3/api-docs
        service-name: user-service
        order: 1
      - name: 资源服务
        url: /resource-service/v3/api-docs
        service-name: resource-service
        order: 2
      - name: 课程服务
        url: /course-service/v3/api-docs
        service-name: course-service
        order: 3
      - name: 社区服务
        url: /community-service/v3/api-docs
        service-name: community-service
        order: 4
      - name: 报告服务
        url: /report-service/v3/api-docs
        service-name: report-service
        order: 5
      - name: 审核服务
        url: /audit-service/v3/api-docs
        service-name: audit-service
        order: 6

# 日志配置
logging:
  level:
    com.edu.platform.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
